name: yoyo sync & build

# Build & publish YOYO Plugin installers (Windows + macOS x64/arm64).
#
# Two modes:
#  - schedule (every 2h): CHECK ONLY. If upstream has new commits, open/update
#    an "upstream-update" issue with a summary (GitHub emails it to the owner)
#    and stop. Nothing is merged or built until the owner approves.
#  - workflow_dispatch: APPROVED BUILD. Merge upstream, build all platforms,
#    publish the release + latest.json. Triggered by yoyo-approve.yml when the
#    owner replies 更新/approve to the issue (email reply works), or manually.
# GitHub cron is UTC and best-effort.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "propose = 只生成确认 issue（含报告+截图）；build = 合并并构建发布"
        type: choice
        default: build
        options: [propose, build]

permissions:
  contents: write
  issues: write

concurrency:
  group: yoyo-sync
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/BigPizzaV3/CodexPlusPlus.git
  UPSTREAM_BRANCH: main
  BRAND: "YOYO Plugin"

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.merge.outputs.changed }}
      version: ${{ steps.ver.outputs.version }}
      sha: ${{ steps.merge.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4 # pin Node for the propose-mode vite build + Playwright
        with:
          node-version: "22"
      - name: Configure git
        run: |
          git config user.name "yoyo-bot"
          git config user.email "yoyo-bot@users.noreply.github.com"
      - name: Fetch upstream
        run: |
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || git remote set-url upstream "$UPSTREAM_URL"
          git fetch --no-tags upstream "$UPSTREAM_BRANCH"
      - name: Propose update for approval (schedule mode)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.action == 'propose')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          UPSTREAM_REF: upstream/${{ env.UPSTREAM_BRANCH }}
        # Builds the proposal issue: commit list, promo/ads scan of the diff,
        # apply-yoyo.sh precheck on the merged tree, and old-vs-new page
        # screenshots (best effort). See scripts/propose-update.sh.
        run: bash scripts/propose-update.sh
      - name: Merge upstream (approved build)
        id: merge
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'build'
        run: |
          set -euo pipefail
          BEFORE=$(git rev-parse HEAD)
          if ! git merge -X ours --no-edit -m "yoyo: sync upstream $(date -u +%FT%TZ)" "upstream/${UPSTREAM_BRANCH}"; then
            # -X ours resolves content conflicts only; path conflicts under
            # .github/workflows (which we pin to ours below) are auto-resolved,
            # anything else needs a human.
            OTHER=$(git diff --name-only --diff-filter=U | grep -v '^\.github/workflows/' || true)
            if [ -n "$OTHER" ]; then
              echo "Unresolvable merge conflicts:" >&2; echo "$OTHER" >&2; exit 1
            fi
            git diff --name-only --diff-filter=U | while IFS= read -r f; do
              git rm -f -q --ignore-unmatch -- "$f"
            done
            git commit --no-edit --no-verify
          fi
          # GITHUB_TOKEN cannot push changes under .github/workflows/ — keep
          # our own CI files and drop upstream's (added files included).
          if ! git diff --quiet "$BEFORE" HEAD -- .github/workflows; then
            git rm -r -f -q --ignore-unmatch -- .github/workflows
            git checkout "$BEFORE" -- .github/workflows
            git commit --amend --no-edit --no-verify
            echo "Kept our own .github/workflows."
          fi
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            git push origin HEAD
            echo "Synced upstream changes."
          else
            echo "No upstream changes; rebuilding current tree."
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          # Build jobs must check out exactly this commit — the default ref
          # pins to the pre-merge trigger SHA and would build a stale tree.
          echo "sha=$AFTER" >> "$GITHUB_OUTPUT"
      - name: Resolve version
        id: ver
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'build'
        run: |
          set -euo pipefail
          V=$(awk '/^\[workspace.package\]/{f=1} f&&/^version/{gsub(/[^0-9.]/,"",$0);print;exit}' Cargo.toml)
          case "$V" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Could not parse version from Cargo.toml (got: '$V')" >&2; exit 3 ;;
          esac
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

  windows:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.sha }} # post-merge commit, not the trigger SHA
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NSIS
        run: choco install nsis -y
      - name: Apply build patch
        shell: bash
        run: REPO_SLUG="$GITHUB_REPOSITORY" BRAND="$BRAND" bash scripts/apply-yoyo.sh
      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: |
          npm install --package-lock=false
          npm run vite:build
      - name: Build binaries
        run: cargo build --release
      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/windows/app/
          $version = "${{ needs.sync.outputs.version }}"
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "makensis" }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/windows/*.exe

  macos:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.sha }} # post-merge commit, not the trigger SHA
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Apply build patch
        run: REPO_SLUG="$GITHUB_REPOSITORY" BRAND="$BRAND" bash scripts/apply-yoyo.sh
      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: |
          npm install --package-lock=false
          npm run vite:build
      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build DMG
        run: |
          VERSION="${{ needs.sync.outputs.version }}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" \
            bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos-${{ matrix.arch }}
          path: dist/macos/*.dmg

  release:
    needs: [sync, windows, macos]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release + latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.sync.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag 2>/dev/null || true
          # one-time: drop the previously-used legacy tag
          gh release delete "v${VERSION}-noads" --repo "$REPO" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" dist/*.exe dist/*.dmg --repo "$REPO" --latest \
            --title "YOYO Plugin ${VERSION}" \
            --notes "YOYO Plugin ${VERSION}. If your OS warns about an unknown developer on first launch, choose Run anyway."
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const crypto = require("crypto");
          const r = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = r.tagName;
          const version = tag.replace(/^v/i, "");
          const base = `https://github.com/${repo}/releases/download/${tag}`;
          // sha256 lets the updater verify installers fetched via third-party
          // CN mirrors; computed from the same local files that were uploaded.
          const assets = (r.assets || []).map(a => a.name)
            .filter(n => n !== "latest.json")
            .map(n => ({
              name: n,
              url: `${base}/${encodeURIComponent(n)}`,
              sha256: crypto.createHash("sha256").update(fs.readFileSync(`dist/${n}`)).digest("hex"),
            }));
          fs.writeFileSync("latest.json",
            JSON.stringify({ version: `v${version}`, url: r.url, body: r.body || "", assets }, null, 2) + "\n");
          NODE
          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
          echo "Published $TAG as latest."
      - name: Close approval issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.sync.outputs.version }}
        run: |
          gh issue list --repo "$REPO" --label upstream-update --state open --json number --jq '.[].number' \
            | while read -r n; do
                gh issue close "$n" --repo "$REPO" --comment "✅ 已构建并发布 v${VERSION}：https://github.com/${REPO}/releases/tag/v${VERSION}" || true
              done

  notify:
    needs: [sync, windows, macos, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open an issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create --repo "$REPO" \
            --title "build failed ($(date -u +%F))" \
            --body "The scheduled build failed. See run: $RUN_URL" \
            || echo "issue creation skipped"
