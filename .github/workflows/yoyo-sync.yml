name: yoyo sync & build

# Daily: check upstream BigPizzaV3/CodexPlusPlus. If changed (or manual run):
#   1. merge upstream into this fork's default branch (conflict-free: we only
#      ADD files, never edit upstream source in the repo);
#   2. apply ad-removal + rebrand AT BUILD TIME (ephemeral, never committed);
#   3. build Windows + macOS (x64/arm64) installers;
#   4. publish them as the "latest" release + latest.json so the in-app
#      updater (pointed at this fork) offers a one-click update.
# 08:00 Asia/Shanghai = 00:00 UTC. GitHub cron is UTC and best-effort.

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: yoyo-sync
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/BigPizzaV3/CodexPlusPlus.git
  UPSTREAM_BRANCH: main
  BRAND: "YOYO Plugin"

jobs:
  sync:
    # Never sync/build/release from a side branch: a workflow_dispatch on a
    # feature branch would otherwise replace the production release.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.ver.outputs.build }}
      version: ${{ steps.ver.outputs.version }}
      sha: ${{ steps.merge.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "yoyo-bot"
          git config user.email "yoyo-bot@users.noreply.github.com"
      - name: Merge upstream
        id: merge
        run: |
          set -euo pipefail
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || git remote set-url upstream "$UPSTREAM_URL"
          git fetch --no-tags upstream "$UPSTREAM_BRANCH"
          BEFORE=$(git rev-parse HEAD)
          if ! git merge -X ours --no-edit -m "yoyo: sync upstream $(date -u +%FT%TZ)" "upstream/${UPSTREAM_BRANCH}"; then
            # -X ours only resolves content conflicts. Path conflicts (e.g.
            # upstream modifies a workflow file an earlier sync dropped:
            # modify/delete) still fail the merge. Resolve conflicts under
            # .github/workflows to our side — the revert below re-pins the
            # whole directory anyway. Anything else needs a human.
            OTHER=$(git diff --name-only --diff-filter=U | grep -v '^\.github/workflows/' || true)
            if [ -n "$OTHER" ]; then
              echo "Unresolvable merge conflicts outside .github/workflows:" >&2
              echo "$OTHER" >&2
              exit 1
            fi
            git diff --name-only --diff-filter=U | while IFS= read -r f; do
              git rm -f -q --ignore-unmatch -- "$f"
            done
            git commit --no-edit --no-verify
          fi
          # The built-in GITHUB_TOKEN cannot create/update files under
          # .github/workflows/ (needs a PAT with the `workflow` scope), so a
          # sync that touches an upstream workflow file gets rejected on push.
          # We maintain our own CI here, so keep our workflow files and drop
          # any upstream changes to them from the merge commit.
          if ! git diff --quiet "$BEFORE" HEAD -- .github/workflows; then
            # rm handles files upstream ADDED (checkout alone would keep them),
            # checkout restores files upstream modified or deleted.
            git rm -r -f -q --ignore-unmatch -- .github/workflows
            git checkout "$BEFORE" -- .github/workflows
            git commit --amend --no-edit --no-verify
            echo "Reverted upstream .github/workflows changes to keep our own CI."
          fi
          AFTER=$(git rev-parse HEAD)
          MERGED=false
          if [ "$BEFORE" != "$AFTER" ]; then
            MERGED=true
            echo "Merged upstream changes (push happens after the transform verify)."
          else
            echo "No upstream changes."
          fi
          echo "merged=$MERGED" >> "$GITHUB_OUTPUT"
          # Build jobs must check out this exact commit: with the default ref,
          # actions/checkout pins to the SHA that triggered the run, which is
          # the PRE-merge tip of main — builds would silently use yesterday's
          # tree while the release is tagged with today's version.
          echo "sha=$AFTER" >> "$GITHUB_OUTPUT"
      - name: Verify yoyo transform (fail fast, BEFORE main advances)
        run: |
          set -euo pipefail
          VDIR="$RUNNER_TEMP/yoyo-verify"
          mkdir -p "$VDIR"
          # Plain copy, not `git archive`: an upstream export-ignore
          # .gitattributes would make the archive diverge from the tree the
          # platform builds actually check out.
          tar --exclude=.git -cf - . | tar -xf - -C "$VDIR"
          (cd "$VDIR" && REPO_SLUG="$GITHUB_REPOSITORY" BRAND="$BRAND" GITHUB_WORKSPACE="$VDIR" bash scripts/apply-yoyo.sh)
      - name: Push merged upstream changes
        if: steps.merge.outputs.merged == 'true'
        run: git push origin HEAD
      - name: Resolve version + decide whether to build
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Take the quoted value inside [workspace.package] and keep only a
          # leading X.Y.Z: comments with digits or a -beta suffix must not
          # leak into the release tag (the updater would prompt forever).
          RAW=$(awk -F'"' '/^\[workspace.package\]/{f=1;next} /^\[/{f=0} f && /^[[:space:]]*version[[:space:]]*=/{print $2; exit}' Cargo.toml)
          V=$(printf '%s' "$RAW" | sed -nE 's/^([0-9]+\.[0-9]+\.[0-9]+).*$/\1/p')
          if [ -z "$V" ]; then
            echo "Could not parse version from Cargo.toml (raw: '$RAW')" >&2
            exit 3
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Upstream version: $V (raw: $RAW)"
          BUILD=false
          [ "${{ steps.merge.outputs.merged }}" = "true" ] && BUILD=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD=true
            echo "Manual dispatch -> forcing build."
          fi
          # Self-heal: if a previous run merged (advancing main) but the build
          # or release then failed, the next runs would otherwise see "no
          # upstream changes" and never release this version.
          if [ "$BUILD" = "false" ] && ! gh release view "v${V}-noads" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            BUILD=true
            echo "Release v${V}-noads is missing -> rebuilding."
          fi
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          # Keepalive: GitHub disables cron schedules in repos with no commit
          # activity for 60 days. If upstream goes quiet, refresh main so the
          # daily sync survives long upstream pauses.
          if [ "$BUILD" = "false" ]; then
            LAST=$(git log -1 --format=%ct)
            AGE_DAYS=$(( ( $(date +%s) - LAST ) / 86400 ))
            if [ "$AGE_DAYS" -ge 50 ]; then
              git commit --allow-empty -m "yoyo: keepalive (no upstream activity for ${AGE_DAYS} days)"
              git push origin HEAD
              echo "Pushed keepalive commit."
            fi
          fi

  windows:
    needs: sync
    if: needs.sync.outputs.build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.sha }} # post-merge commit, not the trigger SHA
          # Build jobs compile upstream-controlled code (cargo build scripts,
          # npm postinstalls) — don't leave a writable token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NSIS
        run: choco install nsis -y
      - name: Apply yoyo transform (ads off + rebrand + updater -> this fork)
        shell: bash
        run: REPO_SLUG="$GITHUB_REPOSITORY" BRAND="$BRAND" bash scripts/apply-yoyo.sh
      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: |
          npm install --package-lock=false
          npm run vite:build
      - name: Build binaries
        run: cargo build --release
      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/windows/app/
          $version = "${{ needs.sync.outputs.version }}"
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "makensis" }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/windows/*.exe

  macos:
    needs: sync
    if: needs.sync.outputs.build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.sha }} # post-merge commit, not the trigger SHA
          # Build jobs compile upstream-controlled code (cargo build scripts,
          # npm postinstalls) — don't leave a writable token in .git/config.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Apply yoyo transform (ads off + rebrand + updater -> this fork)
        run: REPO_SLUG="$GITHUB_REPOSITORY" BRAND="$BRAND" bash scripts/apply-yoyo.sh
      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: |
          npm install --package-lock=false
          npm run vite:build
      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build DMG
        run: |
          VERSION="${{ needs.sync.outputs.version }}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" \
            bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos-${{ matrix.arch }}
          path: dist/macos/*.dmg

  release:
    needs: [sync, windows, macos]
    if: needs.sync.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish ad-free release + latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.sync.outputs.version }}
          TARGET_SHA: ${{ needs.sync.outputs.sha }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}-noads"
          # latest.json is generated from the local artifacts so it can ship
          # inside the release from the start (no API round-trip, no window
          # where the release exists without latest.json).
          node <<'NODE'
          const fs = require("fs");
          const repo = process.env.REPO;
          const version = process.env.VERSION;
          const tag = `v${version}-noads`;
          const base = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = fs.readdirSync("dist")
            .filter(n => n.endsWith(".exe") || n.endsWith(".dmg"))
            .sort()
            .map(n => ({ name: n, url: `${base}/${encodeURIComponent(n)}` }));
          if (assets.length === 0) { console.error("no installer artifacts in dist/"); process.exit(1); }
          fs.writeFileSync("latest.json", JSON.stringify({
            version: `v${version}-noads`,
            url: `https://github.com/${repo}/releases/tag/${tag}`,
            body: `Auto-built ad-free, rebranded build of upstream v${version}. Unsigned - OS may warn on first launch.`,
            assets
          }, null, 2) + "\n");
          NODE
          # Same-version re-runs: drop the previous release+tag first.
          gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag 2>/dev/null || true
          # Draft first: the release only becomes visible (and --latest) once
          # every asset including latest.json is uploaded, so updaters never
          # see a half-published release.
          gh release create "$TAG" dist/*.exe dist/*.dmg latest.json --repo "$REPO" \
            --draft --target "$TARGET_SHA" \
            --title "YOYO Plugin ${VERSION} (no-ads)" \
            --notes "Auto-built ad-free, rebranded build of upstream v${VERSION}. Unsigned - OS may warn on first launch."
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest
          echo "Published $TAG as latest."

  notify:
    needs: [sync, windows, macos, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open an issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create --repo "$REPO" \
            --title "yoyo sync/build failed ($(date -u +%F))" \
            --body "Daily sync/build failed - usually upstream renamed an anchor in apply-yoyo.sh, or a build break. Run: $RUN_URL" \
            || echo "issue creation skipped"
